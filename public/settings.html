<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - TODO</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
  <link rel="apple-touch-icon" href="/images/logo.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>设置</h1>
      <a href="/" class="btn btn-secondary">返回首页</a>
    </header>

    <!-- 背景设置 -->
    <section class="settings-section">
      <h2>背景设置</h2>

      <div class="setting-item">
        <label>背景类型</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="backgroundType" value="color" checked>
            纯色背景
          </label>
          <label>
            <input type="radio" name="backgroundType" value="image">
            图片背景
          </label>
        </div>
      </div>

      <div class="setting-item" id="colorSetting">
        <label>背景颜色</label>
        <input type="color" id="bgColorPicker" value="#f5f5f5">
      </div>

      <div class="setting-item" id="imageSetting" style="display: none;">
        <label>背景图片</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="bgImageInput" accept="image/*" style="display: none;">
          <div class="upload-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <p>点击选择图片或拖拽图片到此处</p>
            <p class="upload-hint">支持 JPG、PNG、GIF、WebP 格式，最大 10MB</p>
          </div>
          <div class="upload-preview" id="uploadPreview" style="display: none;">
            <img id="previewImage" src="" alt="预览">
            <button class="btn-delete-image" id="deleteImageBtn">×</button>
          </div>
        </div>
      </div>

      <div class="setting-item">
        <label>预览</label>
        <div class="background-preview" id="bgPreview">
          <span>背景预览区域</span>
        </div>
      </div>

      <div class="setting-actions">
        <button class="btn btn-secondary" id="resetBtn">重置</button>
        <button class="btn btn-primary" id="saveBtn">保存设置</button>
      </div>
    </section>
  </div>

  <script src="/js/settings.js"></script>
</body>
</html>
