<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史记录 - TODO</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>历史记录</h1>
      <a href="/" class="btn btn-secondary">返回首页</a>
    </header>

    <!-- 年月选择器 -->
    <section class="archive-selector">
      <div class="month-picker">
        <button id="prevMonth" class="btn btn-icon">‹</button>
        <select id="yearSelect"></select>
        <select id="monthSelect"></select>
        <button id="nextMonth" class="btn btn-icon">›</button>
      </div>
      <button id="loadArchive" class="btn btn-primary">查看</button>
    </section>

    <!-- 归档数据展示 -->
    <section class="archive-section">
      <h2 id="archiveTitle">请选择年月</h2>
      <div id="archiveList" class="todo-list"></div>
    </section>
  </div>

  <script>
    const yearSelect = document.getElementById('yearSelect');
    const monthSelect = document.getElementById('monthSelect');
    const loadArchiveBtn = document.getElementById('loadArchive');
    const prevMonthBtn = document.getElementById('prevMonth');
    const nextMonthBtn = document.getElementById('nextMonth');
    const archiveTitle = document.getElementById('archiveTitle');
    const archiveList = document.getElementById('archiveList');

    // 初始化年月选择器
    function initSelectors() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1; // 当前月份

      // 年份选择：过去 5 年到当前年
      for (let y = year - 5; y <= year + 1; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y + '年';
        yearSelect.appendChild(opt);
      }
      yearSelect.value = year;

      // 月份选择
      for (let m = 1; m <= 12; m++) {
        const opt = document.createElement('option');
        opt.value = String(m).padStart(2, '0');
        opt.textContent = String(m).padStart(2, '0') + '月';
        monthSelect.appendChild(opt);
      }
      monthSelect.value = String(month).padStart(2, '0');
    }

    // 获取上月
    function prevMonth() {
      let year = parseInt(yearSelect.value);
      let month = parseInt(monthSelect.value);

      month--;
      if (month < 1) {
        month = 12;
        year--;
      }

      yearSelect.value = year;
      monthSelect.value = String(month).padStart(2, '0');
    }

    // 获取下月
    function nextMonth() {
      let year = parseInt(yearSelect.value);
      let month = parseInt(monthSelect.value);

      month++;
      if (month > 12) {
        month = 1;
        year++;
      }

      yearSelect.value = year;
      monthSelect.value = String(month).padStart(2, '0');
    }

    // 加载归档数据
    async function loadArchive(year, month) {
      archiveTitle.textContent = `${year}年${parseInt(month)}月`;
      archiveList.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const res = await fetch(`/api/archives/${year}/${month}`);
        const data = await res.json();

        if (!data.success || !data.data) {
          archiveList.innerHTML = '<div class="empty-state">该月份暂无归档数据</div>';
          return;
        }

        const archiveData = data.data.data || data.data;

        // 如果 data 是字符串，需要解析
        const parsedData = typeof archiveData === 'string' ? JSON.parse(archiveData) : archiveData;
        const todos = parsedData?.todos || [];
        const categoryName = archiveData?.category_name || '';

        if (todos.length === 0) {
          archiveList.innerHTML = '<div class="empty-state">该月份暂无归档数据</div>';
          return;
        }

        // 按分类名称显示
        archiveList.innerHTML = '';

        const dateEl = document.createElement('div');
        dateEl.className = 'archive-date-group';

        const dateHeader = document.createElement('div');
        dateHeader.className = 'archive-date-header';
        dateHeader.innerHTML = `<strong>${categoryName}</strong> <span>(${todos.length}条)</span>`;
        dateEl.appendChild(dateHeader);

        const childrenList = document.createElement('div');
        childrenList.className = 'children-list';

        // 构建父子关系
        const rootTodos = todos.filter(t => !t.parent_id);
        const childrenMap = {};
        todos.filter(t => t.parent_id).forEach(t => {
          if (!childrenMap[t.parent_id]) childrenMap[t.parent_id] = [];
          childrenMap[t.parent_id].push(t);
        });

        // 渲染根条目和子条目
        rootTodos.forEach(todo => {
          const todoEl = document.createElement('div');
          todoEl.className = `todo-item ${todo.completed ? 'completed' : ''}`;
          todoEl.innerHTML = `
            <div class="todo-row">
              <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} disabled>
              <span class="todo-title">${todo.title}</span>
            </div>
          `;
          childrenList.appendChild(todoEl);

          // 渲染子条目
          const childTodos = childrenMap[todo.id] || [];
          if (childTodos.length > 0) {
            childTodos.forEach(child => {
              const childEl = document.createElement('div');
              childEl.className = `todo-child ${child.completed ? 'completed' : ''}`;
              childEl.style.marginLeft = '30px';
              childEl.innerHTML = `
                <div class="todo-row">
                  <input type="checkbox" class="todo-checkbox" ${child.completed ? 'checked' : ''} disabled>
                  <span class="todo-title">${child.title}</span>
                </div>
              `;
              childrenList.appendChild(childEl);
            });
          }
        });

        dateEl.appendChild(childrenList);
        archiveList.appendChild(dateEl);

      } catch (error) {
        archiveList.innerHTML = '<div class="empty-state">加载失败：' + error.message + '</div>';
      }
    }

    // 事件绑定
    prevMonthBtn.addEventListener('click', prevMonth);
    nextMonthBtn.addEventListener('click', nextMonth);
    loadArchiveBtn.addEventListener('click', () => {
      loadArchive(yearSelect.value, monthSelect.value);
    });

    // 初始化
    initSelectors();

    // 默认加载当前月份的归档数据
    loadArchive(yearSelect.value, monthSelect.value);

    // 如果 URL 包含年月，直接加载
    const pathParts = window.location.pathname.split('/');
    const year = pathParts[2];
    const month = pathParts[3];
    if (year && month) {
      yearSelect.value = year;
      monthSelect.value = month;
      loadArchive(year, month);
    }

    // 加载背景设置
    loadBackgroundSettings();

    // 监听设置变化
    window.addEventListener('storage', (e) => {
      if (e.key === 'settingsChanged') {
        loadBackgroundSettings();
      }
    });

    // 加载背景设置
    async function loadBackgroundSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        if (data.success) {
          const settings = data.data || {};
          const bgType = settings.background_type || 'color';
          const bgColor = settings.background_color || '#f5f5f5';
          const bgImage = settings.background_image || '';

          if (bgType === 'image' && bgImage) {
            document.body.style.setProperty('--bg-image', `url(/backgrounds/${bgImage})`);
            document.body.style.setProperty('--bg-color', 'transparent');
          } else {
            document.body.style.setProperty('--bg-image', 'none');
            document.body.style.setProperty('--bg-color', bgColor);
          }
        }
      } catch (error) {
        console.error('加载背景设置失败:', error);
      }
    }
  </script>
</body>
</html>
