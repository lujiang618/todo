<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>历史记录 - TODO</title>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg">
  <link rel="apple-touch-icon" href="/images/logo.svg">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>历史记录</h1>
      <a href="/" class="btn btn-secondary">返回首页</a>
    </header>

    <!-- 年月选择器 -->
    <section class="archive-selector">
      <div class="month-picker">
        <button id="prevMonth" class="btn btn-icon">‹</button>
        <select id="yearSelect"></select>
        <select id="monthSelect"></select>
        <button id="nextMonth" class="btn btn-icon">›</button>
      </div>
      <button id="loadArchive" class="btn btn-primary">查看</button>
    </section>

    <!-- 归档数据展示 -->
    <section class="archive-section">
      <h2 id="archiveTitle">请选择年月</h2>
      <div id="archiveList" class="todo-list"></div>
    </section>
  </div>

  <!-- 弹窗 -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">标题</h3>
        <button class="btn-close" id="btnClose">×</button>
      </div>
      <div class="modal-body">
        <input type="text" id="modalInput" class="modal-input" placeholder="请输入内容...">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="btnCancel">取消</button>
        <button class="btn btn-primary" id="btnConfirm">确定</button>
      </div>
    </div>
  </div>

  <script>
    const yearSelect = document.getElementById('yearSelect');
    const monthSelect = document.getElementById('monthSelect');
    const loadArchiveBtn = document.getElementById('loadArchive');
    const prevMonthBtn = document.getElementById('prevMonth');
    const nextMonthBtn = document.getElementById('nextMonth');
    const archiveTitle = document.getElementById('archiveTitle');
    const archiveList = document.getElementById('archiveList');

    // 初始化年月选择器
    function initSelectors() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth() + 1; // 当前月份

      // 年份选择：过去 5 年到当前年
      for (let y = year - 5; y <= year + 1; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y + '年';
        yearSelect.appendChild(opt);
      }
      yearSelect.value = year;

      // 月份选择
      for (let m = 1; m <= 12; m++) {
        const opt = document.createElement('option');
        opt.value = String(m).padStart(2, '0');
        opt.textContent = String(m).padStart(2, '0') + '月';
        monthSelect.appendChild(opt);
      }
      monthSelect.value = String(month).padStart(2, '0');
    }

    // 获取上月
    function prevMonth() {
      let year = parseInt(yearSelect.value);
      let month = parseInt(monthSelect.value);

      month--;
      if (month < 1) {
        month = 12;
        year--;
      }

      yearSelect.value = year;
      monthSelect.value = String(month).padStart(2, '0');
    }

    // 获取下月
    function nextMonth() {
      let year = parseInt(yearSelect.value);
      let month = parseInt(monthSelect.value);

      month++;
      if (month > 12) {
        month = 1;
        year++;
      }

      yearSelect.value = year;
      monthSelect.value = String(month).padStart(2, '0');
    }

    // 加载归档数据
    async function loadArchive(year, month) {
      archiveTitle.textContent = `${year}年${parseInt(month)}月`;
      archiveList.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const res = await fetch(`/api/archives/${year}/${month}`);
        const data = await res.json();

        if (!data.success || !data.data) {
          archiveList.innerHTML = '<div class="empty-state">该月份暂无归档数据</div>';
          return;
        }

        const groups = data.data;

        if (groups.length === 0) {
          archiveList.innerHTML = '<div class="empty-state">该月份暂无归档数据</div>';
          return;
        }

        // 渲染所有分类组
        archiveList.innerHTML = '';

        groups.forEach(group => {
          const { category_id, category_name, archived, todos } = group;
          const todoCount = todos ? todos.length : 0;

          const dateEl = document.createElement('div');
          dateEl.className = 'archive-date-group';

          const dateHeader = document.createElement('div');
          dateHeader.className = 'archive-date-header';
          dateHeader.innerHTML = `
            <div class="archive-date-header-left">
              <strong>${category_name}</strong> <span>(${todoCount}条)</span>
            </div>
            <div class="archive-date-header-actions">
              <button class="btn-unarchive" data-category-id="${category_id}" data-category-name="${category_name}" title="取消归档">📥</button>
              <button class="btn-delete-archive" data-category-id="${category_id}" data-category-name="${category_name}" title="删除归档分类">🗑️</button>
            </div>
          `;
          dateEl.appendChild(dateHeader);

          // 绑定取消归档按钮事件
          dateHeader.querySelector('.btn-unarchive').addEventListener('click', () => {
            unarchiveCategory(category_id, category_name);
          });

          // 绑定删除按钮事件
          dateHeader.querySelector('.btn-delete-archive').addEventListener('click', () => {
            deleteArchiveCategory(category_id, category_name);
          });

          // 如果有 TODO，渲染子条目列表
          if (todoCount > 0) {
            const childrenList = document.createElement('div');
            childrenList.className = 'children-list';

            // 构建父子关系
            const rootTodos = todos.filter(t => !t.parent_id);
            const childrenMap = {};
            todos.filter(t => t.parent_id).forEach(t => {
              if (!childrenMap[t.parent_id]) childrenMap[t.parent_id] = [];
              childrenMap[t.parent_id].push(t);
            });

            // 渲染根条目和子条目
            rootTodos.forEach(todo => {
              const todoEl = document.createElement('div');
              todoEl.className = `todo-item ${todo.completed ? 'completed' : ''}`;
              todoEl.innerHTML = `
                <div class="todo-row">
                  <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} disabled>
                  <span class="todo-title">${todo.title}</span>
                </div>
              `;
              childrenList.appendChild(todoEl);

              // 渲染子条目
              const childTodos = childrenMap[todo.id] || [];
              if (childTodos.length > 0) {
                childTodos.forEach(child => {
                  const childEl = document.createElement('div');
                  childEl.className = `todo-child ${child.completed ? 'completed' : ''}`;
                  childEl.style.marginLeft = '30px';
                  childEl.innerHTML = `
                    <div class="todo-row">
                      <input type="checkbox" class="todo-checkbox" ${child.completed ? 'checked' : ''} disabled>
                      <span class="todo-title">${child.title}</span>
                    </div>
                  `;
                  childrenList.appendChild(childEl);
                });
              }
            });

            dateEl.appendChild(childrenList);
          }
          archiveList.appendChild(dateEl);
        });

      } catch (error) {
        archiveList.innerHTML = '<div class="empty-state">加载失败：' + error.message + '</div>';
      }
    }

    // 事件绑定
    prevMonthBtn.addEventListener('click', prevMonth);
    nextMonthBtn.addEventListener('click', nextMonth);
    loadArchiveBtn.addEventListener('click', () => {
      loadArchive(yearSelect.value, monthSelect.value);
    });

    // 初始化
    initSelectors();

    // 默认加载当前月份的归档数据
    loadArchive(yearSelect.value, monthSelect.value);

    // 如果 URL 包含年月，直接加载
    const pathParts = window.location.pathname.split('/');
    const year = pathParts[2];
    const month = pathParts[3];
    if (year && month) {
      yearSelect.value = year;
      monthSelect.value = month;
      loadArchive(year, month);
    }

    // 加载背景设置
    loadBackgroundSettings();

    // 监听设置变化
    window.addEventListener('storage', (e) => {
      if (e.key === 'settingsChanged') {
        loadBackgroundSettings();
      }
    });

    // 删除归档分类
    let deleteCallback = null;
    let unarchiveCallback = null;

    function showUnarchiveConfirm(categoryId, categoryName) {
      const modal = document.getElementById('modal');
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.querySelector('.modal-body');
      const btnClose = document.getElementById('btnClose');
      const btnCancel = document.getElementById('btnCancel');
      const btnConfirm = document.getElementById('btnConfirm');

      modalTitle.textContent = '取消归档确认';
      modalBody.innerHTML = `
        <p style="margin-bottom: 15px;">确定要取消归档分类 "<strong>${categoryName}</strong>" 吗？</p>
        <p style="color: #27ae60;">该分类将重新出现在首页待办列表中。</p>
      `;

      modal.classList.add('show');

      const closeModal = () => {
        modal.classList.remove('show');
        modalBody.innerHTML = '<input type="text" id="modalInput" class="modal-input" placeholder="请输入内容...">';
        unarchiveCallback = null;
      };

      btnClose.onclick = closeModal;
      btnCancel.onclick = closeModal;
      btnConfirm.onclick = () => {
        if (unarchiveCallback) unarchiveCallback();
        closeModal();
      };

      modal.onclick = (e) => {
        if (e.target === modal) closeModal();
      };
    }

    // 取消归档分类
    async function unarchiveCategory(categoryId, categoryName) {
      unarchiveCallback = async () => {
        try {
          const res = await fetch(`/api/categories/${categoryId}/unarchive`, {
            method: 'POST'
          });
          const data = await res.json();

          if (data.success) {
            // 重新加载当前月份的归档数据
            loadArchive(yearSelect.value, monthSelect.value);
          } else {
            alert('取消归档失败：' + (data.error || '未知错误'));
          }
        } catch (error) {
          alert('取消归档失败：' + error.message);
        }
      };

      showUnarchiveConfirm(categoryId, categoryName);
    }

    function showDeleteConfirm(categoryId, categoryName) {
      const modal = document.getElementById('modal');
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.querySelector('.modal-body');
      const modalInput = document.getElementById('modalInput');
      const btnClose = document.getElementById('btnClose');
      const btnCancel = document.getElementById('btnCancel');
      const btnConfirm = document.getElementById('btnConfirm');

      modalTitle.textContent = '删除确认';
      modalBody.innerHTML = `
        <p style="margin-bottom: 15px;">确定要删除归档分类 "<strong>${categoryName}</strong>" 吗？</p>
        <p style="color: #e74c3c;">该分类下的所有条目将被永久删除，此操作不可恢复。</p>
      `;

      modal.classList.add('show');

      const closeModal = () => {
        modal.classList.remove('show');
        modalBody.innerHTML = '<input type="text" id="modalInput" class="modal-input" placeholder="请输入内容...">';
        deleteCallback = null;
      };

      btnClose.onclick = closeModal;
      btnCancel.onclick = closeModal;
      btnConfirm.onclick = () => {
        if (deleteCallback) deleteCallback();
        closeModal();
      };

      modal.onclick = (e) => {
        if (e.target === modal) closeModal();
      };
    }

    // 删除归档分类
    async function deleteArchiveCategory(categoryId, categoryName) {
      deleteCallback = async () => {
        try {
          const res = await fetch(`/api/categories/${categoryId}`, {
            method: 'DELETE'
          });
          const data = await res.json();

          if (data.success) {
            // 重新加载当前月份的归档数据
            loadArchive(yearSelect.value, monthSelect.value);
          } else {
            alert('删除失败：' + (data.error || '未知错误'));
          }
        } catch (error) {
          alert('删除失败：' + error.message);
        }
      };

      showDeleteConfirm(categoryId, categoryName);
    }

    // 加载背景设置
    async function loadBackgroundSettings() {
      try {
        const res = await fetch('/api/settings');
        const data = await res.json();
        if (data.success) {
          const settings = data.data || {};
          const bgType = settings.background_type || 'color';
          const bgColor = settings.background_color || '#f5f5f5';
          const bgImage = settings.background_image || '';

          if (bgType === 'image' && bgImage) {
            document.body.style.setProperty('--bg-image', `url(/backgrounds/${bgImage})`);
            document.body.style.setProperty('--bg-color', 'transparent');
          } else {
            document.body.style.setProperty('--bg-image', 'none');
            document.body.style.setProperty('--bg-color', bgColor);
          }
        }
      } catch (error) {
        console.error('加载背景设置失败:', error);
      }
    }
  </script>
</body>
</html>
